apiVersion: apps/v1
kind: Deployment
metadata:
   name: fhirhydrant
spec:
   replicas: 1
   selector:
      matchLabels:
         app: fhirhydrant
   template:
      metadata:
         labels:
            app: fhirhydrant
      spec:
         containers:
            - name: fhirhydrant
              image: fhirhydrant:latest
              ports:
                 - containerPort: 5000
              envFrom:
                 - secretRef:
                      name: fhirhydrant-secrets
              livenessProbe:
                 httpGet:
                    path: /health
                    port: 5000
                 initialDelaySeconds: 10
              readinessProbe:
                 httpGet:
                    path: /health
                    port: 5000
                 initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
   name: fhirhydrant
spec:
   selector:
      app: fhirhydrant
   ports:
      - port: 80
        targetPort: 5000
