services:
   fhirhydrant:
      build: .
      environment:
         FHIR_BASE_URL: ${FHIR_BASE_URL}
         FHIR_CLIENT_ID: ${FHIR_CLIENT_ID}
         FHIR_ACTIVE_KEY: ${FHIR_ACTIVE_KEY}

   caddy:
      image: caddy:2-alpine
      ports:
         - "80:80"
         - "443:443"
      volumes:
         - ./Caddyfile:/etc/caddy/Caddyfile:ro
         - caddy_data:/data
      depends_on:
         - fhirhydrant

volumes:
   caddy_data:
